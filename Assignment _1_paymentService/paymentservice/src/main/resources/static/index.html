<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Payment Service</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ödeme</h1>
    <div class="card">
        <label for="method">Ödeme Yöntemi</label>
        <select id="method"></select>

        <label for="amount">Tutar (TL)</label>
        <input type="number" id="amount" min="1" step="0.01" placeholder="100.00">

        <button id="pay">Öde</button>

        <div id="result"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
